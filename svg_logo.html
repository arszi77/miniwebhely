<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG Logó</title>
</head>
<body>

<header>
  <a href="index.html" aria-label="Főoldal">

    <svg
      viewBox="0 0 120 120"
      width="120"
      height="120"
      xmlns="http://www.w3.org/2000/svg"
      role="img"
      aria-labelledby="logo-cim"
    >
      <title id="logo-cim">SA logó</title>

      <!-- háttér kör -->
      <circle cx="60" cy="60" r="50" fill="currentColor" />

      <!-- dekoráció -->
      <line x1="20" y1="60" x2="100" y2="60" stroke="white" stroke-width="3"/>

      <!-- szöveg -->
      <text x="60" y="70"
            text-anchor="middle"
            font-size="30"
            fill="white">
        SA
      </text>

    </svg>

  </a>

  <nav aria-label="Főnavigáció">
    <ul>
      <li><a href="#">Főoldal</a></li>
      <li><a href="#">Kapcsolat</a></li>
    </ul>
  </nav>
</header>

</body>
</html>
